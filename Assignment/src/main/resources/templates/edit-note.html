<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Note – NoteApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; box-sizing: border-box; }

        :root {
            --accent: #667eea;
            --accent2: #764ba2;
            --bg: #f5f6fa;
            --card-bg: #ffffff;
            --text: #1a1d2e;
            --muted: #8b8fa8;
            --border: #e8eaf0;
            --sidebar-w: 260px;
        }

        body { background: var(--bg); margin: 0; min-height: 100vh; color: var(--text); }

        /* ── Sidebar (same as dashboard) ── */
        .sidebar {
            position: fixed; top: 0; left: 0;
            width: var(--sidebar-w); height: 100vh;
            background: linear-gradient(180deg, #1a1d2e 0%, #2d2f45 100%);
            display: flex; flex-direction: column;
            z-index: 100;
            box-shadow: 4px 0 24px rgba(0,0,0,0.15);
        }
        .sidebar-brand {
            padding: 1.75rem 1.5rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        .sidebar-brand .logo {
            display: flex; align-items: center; gap: 0.75rem; text-decoration: none;
        }
        .logo-icon {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; color: #fff;
        }
        .logo-text { font-size: 1.2rem; font-weight: 700; color: #fff; }

        .sidebar-user {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            display: flex; align-items: center; gap: 0.75rem;
        }
        .user-avatar {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; color: #fff; font-weight: 600; flex-shrink: 0;
        }
        .user-name { font-size: 0.88rem; font-weight: 600; color: #fff; }
        .user-role { font-size: 0.75rem; color: rgba(255,255,255,0.4); }

        .sidebar-nav { flex: 1; padding: 1rem 0.75rem; }
        .nav-section-label {
            font-size: 0.68rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.08em; color: rgba(255,255,255,0.3);
            padding: 0.5rem 0.75rem; margin-bottom: 0.25rem;
        }
        .nav-item-link {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.65rem 0.75rem; border-radius: 8px;
            color: rgba(255,255,255,0.6); text-decoration: none;
            font-size: 0.88rem; font-weight: 500; transition: all 0.15s;
            margin-bottom: 0.15rem;
        }
        .nav-item-link:hover { background: rgba(255,255,255,0.07); color: #fff; }
        .nav-item-link.active {
            background: linear-gradient(135deg, rgba(102,126,234,0.25), rgba(118,75,162,0.25));
            color: #fff; border: 1px solid rgba(102,126,234,0.3);
        }
        .nav-item-link i { font-size: 1rem; width: 18px; text-align: center; }

        .sidebar-footer {
            padding: 1rem 0.75rem;
            border-top: 1px solid rgba(255,255,255,0.07);
        }
        .btn-logout {
            display: flex; align-items: center; gap: 0.75rem; width: 100%;
            padding: 0.65rem 0.75rem; border-radius: 8px;
            background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2);
            color: #f87171; font-size: 0.88rem; font-weight: 500;
            text-decoration: none; transition: all 0.15s;
        }
        .btn-logout:hover { background: rgba(239,68,68,0.2); color: #fca5a5; }

        /* ── Main content ── */
        .main-content { margin-left: var(--sidebar-w); min-height: 100vh; display: flex; flex-direction: column; }

        .topbar {
            background: var(--card-bg); border-bottom: 1px solid var(--border);
            padding: 1rem 2rem; display: flex; align-items: center;
            justify-content: space-between; position: sticky; top: 0; z-index: 50;
        }
        .topbar-back {
            display: flex; align-items: center; gap: 0.5rem;
            color: var(--muted); text-decoration: none; font-size: 0.88rem;
            font-weight: 500; transition: color 0.15s;
        }
        .topbar-back:hover { color: var(--accent); }
        .topbar-title { font-size: 1rem; font-weight: 700; color: var(--text); }

        /* ── Editor area ── */
        .editor-wrapper {
            flex: 1;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 2.5rem 2rem;
        }
        .editor-card {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            width: 100%;
            max-width: 720px;
            overflow: hidden;
        }

        /* Coloured top strip */
        .editor-card-header {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            padding: 1.5rem 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .editor-card-header .header-icon {
            width: 40px; height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; color: #fff;
        }
        .editor-card-header .header-text h5 {
            color: #fff; font-weight: 700; margin: 0; font-size: 1rem;
        }
        .editor-card-header .header-text p {
            color: rgba(255,255,255,0.7); margin: 0; font-size: 0.8rem;
        }

        .editor-card-body { padding: 2rem; }

        /* Title input — large, clean */
        .title-input {
            width: 100%;
            border: none;
            border-bottom: 2px solid var(--border);
            border-radius: 0;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text);
            padding: 0.5rem 0;
            background: transparent;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 1.5rem;
        }
        .title-input:focus { border-bottom-color: var(--accent); }
        .title-input::placeholder { color: #c8cad8; font-weight: 400; }

        /* Content textarea */
        .content-textarea {
            width: 100%;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-size: 0.95rem;
            color: var(--text);
            padding: 1rem 1.25rem;
            background: #fafbfc;
            outline: none;
            resize: vertical;
            min-height: 220px;
            line-height: 1.7;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .content-textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
            background: #fff;
        }
        .content-textarea::placeholder { color: #b0b4c8; }

        /* Char counter */
        .char-counter {
            text-align: right;
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 0.4rem;
        }

        /* Action buttons */
        .editor-actions {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.75rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }
        .btn-save {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none; border-radius: 10px; color: #fff;
            font-weight: 600; font-size: 0.9rem;
            padding: 0.7rem 1.75rem;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-save:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-save:active { transform: scale(0.97); }
        .btn-cancel {
            background: var(--bg); border: 1.5px solid var(--border);
            border-radius: 10px; color: var(--muted);
            font-weight: 600; font-size: 0.9rem;
            padding: 0.7rem 1.5rem;
            text-decoration: none; transition: all 0.15s;
            display: inline-flex; align-items: center; gap: 0.4rem;
        }
        .btn-cancel:hover { border-color: var(--muted); color: var(--text); }

        /* Mobile */
        .mobile-topbar {
            display: none; background: #1a1d2e;
            padding: 1rem 1.25rem; align-items: center;
            justify-content: space-between; position: sticky; top: 0; z-index: 200;
        }
        .mobile-topbar .logo-text { color: #fff; font-weight: 700; font-size: 1.1rem; }
        .hamburger { background: none; border: none; color: #fff; font-size: 1.4rem; cursor: pointer; }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); transition: transform 0.3s ease; }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.open { display: block; }
            .main-content { margin-left: 0; }
            .topbar { display: none; }
            .mobile-topbar { display: flex; }
            .editor-wrapper { padding: 1.25rem; }
            .editor-card-body { padding: 1.25rem; }
            .title-input { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<!-- Mobile topbar -->
<div class="mobile-topbar">
    <div class="d-flex align-items-center gap-2">
        <button class="hamburger" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
        <span class="logo-text"><i class="bi bi-journal-text me-1"></i>NoteApp</span>
    </div>
    <a th:href="@{/dashboard}" class="text-white-50 small text-decoration-none">
        <i class="bi bi-arrow-left me-1"></i>Back
    </a>
</div>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- ══ SIDEBAR ══ -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
        <a th:href="@{/dashboard}" class="logo">
            <div class="logo-icon"><i class="bi bi-journal-text"></i></div>
            <span class="logo-text">NoteApp</span>
        </a>
    </div>
    <div class="sidebar-user">
        <div class="user-avatar" th:text="${username != null ? username.substring(0,1).toUpperCase() : 'U'}"></div>
        <div>
            <div class="user-name" th:text="${username}"></div>
            <div class="user-role">Personal workspace</div>
        </div>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section-label">Menu</div>
        <a th:href="@{/dashboard}" class="nav-item-link">
            <i class="bi bi-grid-1x2"></i><span>My Notes</span>
        </a>
        <a href="#" class="nav-item-link active">
            <i class="bi bi-pencil-square"></i><span>Edit Note</span>
        </a>
    </nav>
    <div class="sidebar-footer">
        <a th:href="@{/logout}" class="btn-logout">
            <i class="bi bi-box-arrow-left"></i><span>Sign Out</span>
        </a>
    </div>
</aside>

<!-- ══ MAIN CONTENT ══ -->
<div class="main-content">

    <!-- Top bar -->
    <div class="topbar">
        <a th:href="@{/dashboard}" class="topbar-back">
            <i class="bi bi-arrow-left"></i> Back to Notes
        </a>
        <span class="topbar-title">Edit Note</span>
        <div style="width: 120px;"></div>
    </div>

    <!-- Editor -->
    <div class="editor-wrapper">
        <div class="editor-card">

            <!-- Card header strip -->
            <div class="editor-card-header">
                <div class="header-icon"><i class="bi bi-pencil-square"></i></div>
                <div class="header-text">
                    <h5>Edit Note</h5>
                    <p>Make your changes and save</p>
                </div>
            </div>

            <!-- Form body -->
            <div class="editor-card-body">
                <form th:action="@{/notes/edit/{id}(id=${note.id})}" method="post" id="editForm">

                    <!-- Title -->
                    <input type="text" id="titleInput" name="title"
                           class="title-input"
                           th:value="${note.title}"
                           placeholder="Note title..."
                           maxlength="200" required autofocus>

                    <!-- Content -->
                    <textarea id="contentInput" name="content"
                              class="content-textarea"
                              placeholder="Write your note here..."
                              maxlength="10000" required
                              th:text="${note.content}"
                              oninput="updateCounter()"></textarea>
                    <div class="char-counter">
                        <span id="charCount">0</span> / 10,000
                    </div>

                    <!-- Actions -->
                    <div class="editor-actions">
                        <button type="submit" class="btn-save">
                            <i class="bi bi-check-lg me-1"></i>Save Changes
                        </button>
                        <a th:href="@{/dashboard}" class="btn-cancel">
                            <i class="bi bi-x-lg"></i>Cancel
                        </a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebarOverlay').classList.toggle('open');
    }

    // Character counter for content textarea
    function updateCounter() {
        const len = document.getElementById('contentInput').value.length;
        document.getElementById('charCount').textContent = len;
    }

    // Init counter on page load
    updateCounter();
</script>
</body>
</html>
