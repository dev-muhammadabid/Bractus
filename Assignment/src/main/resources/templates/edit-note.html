<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Note – NoteApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f2f5;
            min-height: 100vh;
        }
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.3rem;
            color: #fff !important;
        }
        .edit-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.1);
            padding: 2rem;
            max-width: 680px;
            margin: 2.5rem auto;
        }
        .edit-card h4 {
            font-weight: 700;
            color: #667eea;
            margin-bottom: 1.5rem;
        }
        .btn-save {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: #fff;
        }
        .btn-save:hover {
            background: linear-gradient(135deg, #5a6fd6, #6a3f96);
            color: #fff;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" th:href="@{/dashboard}">
            <i class="bi bi-journal-text me-1"></i>NoteApp
        </a>
        <div class="ms-auto">
            <span class="text-white-50 small">
                <i class="bi bi-person-circle me-1"></i>
                <span th:text="${username}" class="text-white fw-semibold"></span>
            </span>
        </div>
    </div>
</nav>

<div class="container">
    <div class="edit-card">
        <h4><i class="bi bi-pencil-square me-2"></i>Edit Note</h4>

        <!-- Edit form — POSTs to /notes/edit/{id} -->
        <form th:action="@{/notes/edit/{id}(id=${note.id})}" method="post">
            <div class="mb-3">
                <label for="title" class="form-label fw-semibold">Title</label>
                <input type="text" id="title" name="title"
                       class="form-control form-control-lg"
                       th:value="${note.title}"
                       maxlength="200" required autofocus>
            </div>

            <div class="mb-4">
                <label for="content" class="form-label fw-semibold">Content</label>
                <textarea id="content" name="content"
                          class="form-control" rows="8"
                          maxlength="10000" required
                          th:text="${note.content}"></textarea>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-save px-4 py-2 fw-semibold">
                    <i class="bi bi-check-lg me-1"></i>Save Changes
                </button>
                <a th:href="@{/dashboard}" class="btn btn-outline-secondary px-4 py-2">
                    <i class="bi bi-x-lg me-1"></i>Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
