<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up – NoteApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
        }
        .brand-icon {
            font-size: 2.5rem;
            color: #667eea;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #5a6fd6, #6a3f96);
        }
        .password-hint {
            font-size: 0.78rem;
            color: #6c757d;
        }
    </style>
</head>
<body>
<div class="auth-card">
    <!-- Brand -->
    <div class="text-center mb-4">
        <i class="bi bi-journal-text brand-icon"></i>
        <h2 class="fw-bold mt-2 mb-0">NoteApp</h2>
        <p class="text-muted small">Create your free account</p>
    </div>

    <!-- Error alert -->
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show py-2" role="alert">
        <i class="bi bi-exclamation-circle me-1"></i>
        <span th:text="${error}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Signup form -->
    <form th:action="@{/signup}" th:object="${signupRequest}" method="post">
        <div class="mb-3">
            <label for="username" class="form-label fw-semibold">Username</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" id="username" th:field="*{username}"
                       class="form-control" placeholder="3–30 chars, letters/numbers/_" autofocus>
            </div>
            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('username')}"
                 th:errors="*{username}"></div>
        </div>

        <div class="mb-4">
            <label for="password" class="form-label fw-semibold">Password</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" id="password" th:field="*{password}"
                       class="form-control" placeholder="At least 8 characters">
            </div>
            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}"
                 th:errors="*{password}"></div>
            <div class="password-hint mt-1">Minimum 8 characters.</div>
        </div>

        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
            <i class="bi bi-person-plus me-1"></i> Create Account
        </button>
    </form>

    <hr class="my-4">
    <p class="text-center text-muted mb-0">
        Already have an account?
        <a th:href="@{/login}" class="text-decoration-none fw-semibold">Sign in</a>
    </p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
