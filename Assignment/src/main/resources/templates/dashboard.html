<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – NoteApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; box-sizing: border-box; }

        :root {
            --sidebar-w: 260px;
            --accent: #667eea;
            --accent2: #764ba2;
            --bg: #f5f6fa;
            --card-bg: #ffffff;
            --text: #1a1d2e;
            --muted: #8b8fa8;
            --border: #e8eaf0;
        }

        body { background: var(--bg); margin: 0; min-height: 100vh; color: var(--text); }

        /* ══════════════════════════════
           SIDEBAR
        ══════════════════════════════ */
        .sidebar {
            position: fixed;
            top: 0; left: 0;
            width: var(--sidebar-w);
            height: 100vh;
            background: linear-gradient(180deg, #1a1d2e 0%, #2d2f45 100%);
            display: flex;
            flex-direction: column;
            padding: 0;
            z-index: 100;
            box-shadow: 4px 0 24px rgba(0,0,0,0.15);
        }

        .sidebar-brand {
            padding: 1.75rem 1.5rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.07);
        }
        .sidebar-brand .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }
        .sidebar-brand .logo-icon {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; color: #fff;
        }
        .sidebar-brand .logo-text {
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
        }

        /* User profile in sidebar */
        .sidebar-user {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .user-avatar {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; color: #fff; font-weight: 600;
            flex-shrink: 0;
        }
        .user-info .user-name {
            font-size: 0.88rem;
            font-weight: 600;
            color: #fff;
            line-height: 1.2;
        }
        .user-info .user-role {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
        }

        /* Sidebar nav */
        .sidebar-nav {
            flex: 1;
            padding: 1rem 0.75rem;
            overflow-y: auto;
        }
        .nav-section-label {
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: rgba(255,255,255,0.3);
            padding: 0.5rem 0.75rem;
            margin-bottom: 0.25rem;
        }
        .nav-item-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.65rem 0.75rem;
            border-radius: 8px;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 500;
            transition: all 0.15s;
            margin-bottom: 0.15rem;
        }
        .nav-item-link:hover { background: rgba(255,255,255,0.07); color: #fff; }
        .nav-item-link.active {
            background: linear-gradient(135deg, rgba(102,126,234,0.25), rgba(118,75,162,0.25));
            color: #fff;
            border: 1px solid rgba(102,126,234,0.3);
        }
        .nav-item-link i { font-size: 1rem; width: 18px; text-align: center; }

        /* Notes count badge in sidebar */
        .nav-badge {
            margin-left: auto;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.15rem 0.5rem;
            border-radius: 20px;
            min-width: 22px;
            text-align: center;
        }

        /* Sidebar footer */
        .sidebar-footer {
            padding: 1rem 0.75rem;
            border-top: 1px solid rgba(255,255,255,0.07);
        }
        .btn-logout {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            width: 100%;
            padding: 0.65rem 0.75rem;
            border-radius: 8px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            color: #f87171;
            font-size: 0.88rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.15s;
        }
        .btn-logout:hover { background: rgba(239,68,68,0.2); color: #fca5a5; }

        /* ══════════════════════════════
           MAIN CONTENT
        ══════════════════════════════ */
        .main-content {
            margin-left: var(--sidebar-w);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Top bar */
        .topbar {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        .topbar-title h4 {
            font-size: 1.15rem;
            font-weight: 700;
            margin: 0;
            color: var(--text);
        }
        .topbar-title p {
            font-size: 0.8rem;
            color: var(--muted);
            margin: 0;
        }
        .topbar-actions { display: flex; align-items: center; gap: 0.75rem; }
        .notes-pill {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            border-radius: 20px;
            padding: 0.3rem 0.9rem;
            font-size: 0.78rem;
            font-weight: 600;
        }

        /* Page body */
        .page-body { padding: 2rem; flex: 1; }

        /* ══════════════════════════════
           CREATE NOTE PANEL
        ══════════════════════════════ */
        .create-panel {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .create-panel-header {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1.25rem;
        }
        .create-panel-header .icon-box {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-size: 0.9rem;
        }
        .create-panel-header span {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text);
        }
        .create-panel .form-control {
            border: 1.5px solid var(--border);
            border-radius: 10px;
            font-size: 0.9rem;
            color: var(--text);
            background: #fafbfc;
            transition: all 0.2s;
        }
        .create-panel .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(102,126,234,0.12);
            background: #fff;
        }
        .create-panel .form-control::placeholder { color: #b0b4c8; }
        .btn-add-note {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
            font-size: 0.88rem;
            padding: 0.6rem 1.4rem;
            transition: all 0.2s;
        }
        .btn-add-note:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-add-note:active { transform: scale(0.97); }

        /* ══════════════════════════════
           NOTES GRID
        ══════════════════════════════ */
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.25rem;
        }

        /* Color accents cycling through notes */
        .note-card { --card-accent: #667eea; }
        .note-card:nth-child(6n+1) { --card-accent: #667eea; }
        .note-card:nth-child(6n+2) { --card-accent: #f093fb; }
        .note-card:nth-child(6n+3) { --card-accent: #4facfe; }
        .note-card:nth-child(6n+4) { --card-accent: #43e97b; }
        .note-card:nth-child(6n+5) { --card-accent: #fa709a; }
        .note-card:nth-child(6n+6) { --card-accent: #f6d365; }

        .note-card {
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 1.25rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        .note-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: var(--card-accent);
        }
        .note-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(0,0,0,0.1);
        }

        .note-card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 0.75rem;
        }
        .note-title {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text);
            line-height: 1.4;
            flex: 1;
            margin-right: 0.5rem;
            word-break: break-word;
        }
        .note-menu { position: relative; }
        .note-menu-btn {
            background: none;
            border: none;
            color: var(--muted);
            padding: 0.2rem 0.4rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.15s;
            line-height: 1;
        }
        .note-menu-btn:hover { background: var(--bg); color: var(--text); }

        .note-content {
            font-size: 0.85rem;
            color: #5a5f7a;
            line-height: 1.6;
            flex: 1;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .note-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 1rem;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
        }
        .note-time {
            font-size: 0.72rem;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .note-actions { display: flex; gap: 0.4rem; }
        .btn-note-action {
            width: 30px; height: 30px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--muted);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem;
            text-decoration: none;
            transition: all 0.15s;
            cursor: pointer;
        }
        .btn-note-action:hover { background: var(--card-accent); border-color: var(--card-accent); color: #fff; }
        .btn-note-action.delete:hover { background: #ef4444; border-color: #ef4444; color: #fff; }

        /* ══════════════════════════════
           EMPTY STATE
        ══════════════════════════════ */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
        }
        .empty-icon {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, rgba(102,126,234,0.1), rgba(118,75,162,0.1));
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2rem;
            color: var(--accent);
        }
        .empty-state h5 { font-weight: 700; color: var(--text); margin-bottom: 0.5rem; }
        .empty-state p { color: var(--muted); font-size: 0.88rem; }

        /* ══════════════════════════════
           MOBILE TOPBAR (hamburger)
        ══════════════════════════════ */
        .mobile-topbar {
            display: none;
            background: #1a1d2e;
            padding: 1rem 1.25rem;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 200;
        }
        .mobile-topbar .logo-text { color: #fff; font-weight: 700; font-size: 1.1rem; }
        .hamburger { background: none; border: none; color: #fff; font-size: 1.4rem; cursor: pointer; }

        /* Sidebar overlay on mobile */
        .sidebar-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 99;
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); transition: transform 0.3s ease; }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.open { display: block; }
            .main-content { margin-left: 0; }
            .topbar { display: none; }
            .mobile-topbar { display: flex; }
            .page-body { padding: 1.25rem; }
            .notes-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- Mobile top bar -->
<div class="mobile-topbar">
    <div class="d-flex align-items-center gap-2">
        <button class="hamburger" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
        <span class="logo-text"><i class="bi bi-journal-text me-1"></i>NoteApp</span>
    </div>
    <span class="notes-pill" th:text="${notes.size()} + ' notes'"></span>
</div>

<!-- Sidebar overlay (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- ══ SIDEBAR ══ -->
<aside class="sidebar" id="sidebar">

    <!-- Brand -->
    <div class="sidebar-brand">
        <a href="#" class="logo">
            <div class="logo-icon"><i class="bi bi-journal-text"></i></div>
            <span class="logo-text">NoteApp</span>
        </a>
    </div>

    <!-- User -->
    <div class="sidebar-user">
        <div class="user-avatar" th:text="${username != null ? username.substring(0,1).toUpperCase() : 'U'}"></div>
        <div class="user-info">
            <div class="user-name" th:text="${username}"></div>
            <div class="user-role">Personal workspace</div>
        </div>
    </div>

    <!-- Nav -->
    <nav class="sidebar-nav">
        <div class="nav-section-label">Menu</div>
        <a href="#" class="nav-item-link active">
            <i class="bi bi-grid-1x2"></i>
            <span>My Notes</span>
            <span class="nav-badge" th:text="${notes.size()}"></span>
        </a>
        <a href="#" class="nav-item-link" onclick="scrollToCreate(); return false;">
            <i class="bi bi-plus-square"></i>
            <span>New Note</span>
        </a>
    </nav>

    <!-- Logout -->
    <div class="sidebar-footer">
        <a th:href="@{/logout}" class="btn-logout">
            <i class="bi bi-box-arrow-left"></i>
            <span>Sign Out</span>
        </a>
    </div>
</aside>

<!-- ══ MAIN CONTENT ══ -->
<div class="main-content">

    <!-- Top bar -->
    <div class="topbar">
        <div class="topbar-title">
            <h4>My Notes</h4>
            <p>Manage your personal notes</p>
        </div>
        <div class="topbar-actions">
            <span class="notes-pill" th:text="${notes.size()} + ' note' + (${notes.size()} != 1 ? 's' : '')"></span>
        </div>
    </div>

    <!-- Page body -->
    <div class="page-body">

        <!-- ── Create Note Panel ── -->
        <div class="create-panel" id="createPanel">
            <div class="create-panel-header">
                <div class="icon-box"><i class="bi bi-plus-lg"></i></div>
                <span>New Note</span>
            </div>
            <form th:action="@{/notes/create}" method="post">
                <div class="row g-3">
                    <div class="col-12 col-md-4">
                        <input type="text" name="title" class="form-control"
                               placeholder="Note title..." maxlength="200" required>
                    </div>
                    <div class="col-12 col-md-6">
                        <input type="text" name="content" class="form-control"
                               placeholder="What's on your mind?" maxlength="10000" required>
                    </div>
                    <div class="col-12 col-md-2">
                        <button type="submit" class="btn-add-note w-100">
                            <i class="bi bi-plus-lg me-1"></i>Add
                        </button>
                    </div>
                </div>
            </form>
        </div>

        <!-- ── Notes Grid ── -->
        <div class="notes-grid">

            <!-- Empty state -->
            <div th:if="${notes.isEmpty()}" class="empty-state">
                <div class="empty-icon"><i class="bi bi-journal-plus"></i></div>
                <h5>No notes yet</h5>
                <p>Create your first note using the form above.</p>
            </div>

            <!-- Note cards -->
            <div th:each="note : ${notes}" class="note-card">
                <div class="note-card-top">
                    <div class="note-title" th:text="${note.title}"></div>
                </div>
                <div class="note-content" th:text="${note.content}"></div>
                <div class="note-footer">
                    <div class="note-time">
                        <i class="bi bi-clock"></i>
                        <span th:text="${note.updatedAt != null ? note.updatedAt : note.createdAt}"></span>
                    </div>
                    <div class="note-actions">
                        <!-- Edit button -->
                        <a th:href="@{/notes/edit/{id}(id=${note.id})}"
                           class="btn-note-action" title="Edit">
                            <i class="bi bi-pencil"></i>
                        </a>
                        <!-- Delete button -->
                        <form th:action="@{/notes/delete/{id}(id=${note.id})}" method="post" style="margin:0">
                            <button type="submit" class="btn-note-action delete" title="Delete"
                                    onclick="return confirm('Delete this note?')">
                                <i class="bi bi-trash"></i>
                            </button>
                        </form>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebarOverlay').classList.toggle('open');
    }
    function scrollToCreate() {
        document.getElementById('createPanel').scrollIntoView({ behavior: 'smooth' });
        toggleSidebar();
    }
</script>
</body>
</html>
