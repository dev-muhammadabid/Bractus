<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – NoteApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f2f5;
            min-height: 100vh;
        }

        /* ── Navbar ── */
        .navbar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.3rem;
            color: #fff !important;
        }
        .navbar-brand i { margin-right: 6px; }

        /* ── Create note card ── */
        .create-card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .create-card h5 {
            font-weight: 700;
            color: #667eea;
            margin-bottom: 1rem;
        }

        /* ── Note cards ── */
        .note-card {
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.07);
            padding: 1.25rem 1.5rem;
            margin-bottom: 1rem;
            border-left: 4px solid #667eea;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }
        .note-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        }
        .note-title {
            font-weight: 700;
            font-size: 1.05rem;
            color: #2d3748;
            margin-bottom: 0.4rem;
        }
        .note-content {
            color: #4a5568;
            font-size: 0.92rem;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .note-meta {
            font-size: 0.75rem;
            color: #a0aec0;
            margin-top: 0.6rem;
        }
        .note-actions .btn {
            font-size: 0.8rem;
            padding: 0.25rem 0.65rem;
        }

        /* ── Empty state ── */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #a0aec0;
        }
        .empty-state i {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            display: block;
        }

        /* ── Stats badge ── */
        .notes-count {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border-radius: 20px;
            padding: 0.2rem 0.75rem;
            font-size: 0.8rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

<!-- ── Navbar ── -->
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="#">
            <i class="bi bi-journal-text"></i>NoteApp
        </a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <span class="text-white-50 small">
                <i class="bi bi-person-circle me-1"></i>
                <span th:text="${username}" class="text-white fw-semibold"></span>
            </span>
            <a th:href="@{/logout}" class="btn btn-outline-light btn-sm">
                <i class="bi bi-box-arrow-right me-1"></i>Logout
            </a>
        </div>
    </div>
</nav>

<div class="container py-4">

    <!-- ── Page header ── -->
    <div class="d-flex align-items-center mb-4">
        <div>
            <h4 class="fw-bold mb-0">My Notes</h4>
            <p class="text-muted small mb-0">Manage your personal notes</p>
        </div>
        <div class="ms-auto">
            <span class="notes-count" th:text="${notes.size()} + ' note' + (${notes.size()} != 1 ? 's' : '')"></span>
        </div>
    </div>

    <!-- ── Create Note Card ── -->
    <div class="create-card">
        <h5><i class="bi bi-plus-circle me-2"></i>New Note</h5>
        <form th:action="@{/notes/create}" method="post">
            <div class="mb-3">
                <input type="text" name="title" class="form-control"
                       placeholder="Note title..." maxlength="200" required>
            </div>
            <div class="mb-3">
                <textarea name="content" class="form-control" rows="3"
                          placeholder="Write your note here..." maxlength="10000" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary px-4">
                <i class="bi bi-plus-lg me-1"></i>Add Note
            </button>
        </form>
    </div>

    <!-- ── Notes List ── -->
    <!-- Empty state when no notes exist -->
    <div th:if="${notes.isEmpty()}" class="empty-state">
        <i class="bi bi-journal-x"></i>
        <h5 class="fw-semibold">No notes yet</h5>
        <p class="small">Create your first note using the form above.</p>
    </div>

    <!-- Note cards -->
    <div th:each="note : ${notes}" class="note-card">
        <div class="d-flex justify-content-between align-items-start">
            <div class="flex-grow-1 me-3">
                <div class="note-title" th:text="${note.title}"></div>
                <div class="note-content" th:text="${note.content}"></div>
                <div class="note-meta">
                    <i class="bi bi-clock me-1"></i>
                    <!-- Display updatedAt timestamp if available -->
                    <span th:if="${note.updatedAt != null}" th:text="${note.updatedAt}"></span>
                    <span th:if="${note.updatedAt == null}" th:text="${note.createdAt}"></span>
                </div>
            </div>
            <!-- Action buttons -->
            <div class="note-actions d-flex gap-2 flex-shrink-0">
                <a th:href="@{/notes/edit/{id}(id=${note.id})}"
                   class="btn btn-outline-primary btn-sm">
                    <i class="bi bi-pencil"></i>
                </a>
                <form th:action="@{/notes/delete/{id}(id=${note.id})}" method="post"
                      onsubmit="return confirm('Delete this note?')">
                    <button type="submit" class="btn btn-outline-danger btn-sm">
                        <i class="bi bi-trash"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
